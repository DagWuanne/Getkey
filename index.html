<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDQ Key System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin: 0;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #4c51bf;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 26px; }
        .content { padding: 28px 22px; }
        .info {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 15px;
        }
        .time {
            text-align: center;
            font-size: 14.5px;
            color: #64748b;
            margin-bottom: 22px;
        }
        .key-box {
            background: #f8fafc;
            border: 3px dashed #4c51bf;
            border-radius: 12px;
            padding: 24px 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            min-height: 82px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17.5px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0f9c6e; }
        .footer {
            text-align: center;
            padding: 16px;
            background: #f1f5f9;
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
        }
        .success { color: #10b981; text-align: center; margin-top: 10px; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔑 Key System</h1>
    </div>

    <div class="content">
        <div class="info">
            <div><strong>ID:</strong> <span id="tgId">Null</span></div>
            <div><strong>Username:</strong> <span id="tgUsername">Null</span></div>
        </div>

        <div class="time"><span id="currentTime"></span></div>

        <div class="key-box" id="keyBox">Đang tải key...</div>

        <button onclick="copyKey()">📋 Copy Key</button>
        <div id="copyMessage" class="success"></div>
    </div>

    <div class="footer" onclick="showTelegram()">
        © Copyright BDQuan
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const key = urlParams.get('id');
const tgId = urlParams.get('user_id');
const tgUsername = urlParams.get('username');

document.getElementById('keyBox').textContent = key || "Không tìm thấy key";
document.getElementById('tgId').textContent = tgId || "Null";
document.getElementById('tgUsername').textContent = tgUsername ? "@" + tgUsername : "Null";

function updateTime() {
    document.getElementById('currentTime').textContent = new Date().toLocaleString('vi-VN');
}
setInterval(updateTime, 1000);
updateTime();

function copyKey() {
    const keyText = document.getElementById('keyBox').textContent.trim();
    if (keyText === "Không tìm thấy key") {
        alert("Không có key để copy!");
        return;
    }
    navigator.clipboard.writeText(keyText).then(() => {
        document.getElementById('copyMessage').textContent = "✅ Đã copy key thành công!";
        setTimeout(() => document.getElementById('copyMessage').textContent = "", 2500);
    });
}

function showTelegram() {
    alert("Telegram: @vuammo\nCảm ơn bạn đã sử dụng BDQ Key System!");
}
</script>

</body>
</html>
